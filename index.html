<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>لف أكثر! — Laf Akthar!</title>
  <!--
    Kiosk Launch Flags (Chrome/Edge):
    --kiosk --noerrdialogs --disable-pinch
    --kiosk       → true fullscreen (Esc-proof); Fullscreen API alone can be exited
    --noerrdialogs → suppress JS error dialogs on crash
    --disable-pinch → extra guard against pinch-zoom
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/Logo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <img src="assets/Logo.png" alt="Logo" class="top-logo">

  <img src="assets/chef.png" alt="" class="chef">

  <section id="screen-attract" class="screen">
    <h1 class="attract-label">المس للبدء</h1>
    <div class="speech-bubble">
      <img src="assets/chat.png" alt="" class="speech-bubble-img">
      <span class="speech-bubble-text"></span>
    </div>
  </section>

  <section id="screen-countdown" class="screen hidden">
    <span class="countdown-number">3</span>
    <div class="speech-bubble">
      <img src="assets/chat.png" alt="" class="speech-bubble-img">
      <span class="speech-bubble-text"></span>
    </div>
  </section>

  <section id="screen-game" class="screen hidden">
    <div class="speech-bubble">
      <img src="assets/chat.png" alt="" class="speech-bubble-img">
      <span class="speech-bubble-text"></span>
    </div>

    <div class="leaderboard-panel">
      <div class="lb-image-container">
        <div class="lb-rows"></div>
      </div>
    </div>

    <div class="timer">
      <img src="assets/time_box.png" alt="" class="timer-frame">
      <span class="timer-value">10</span>
    </div>

    <img src="assets/path.png" alt="" class="coil-guide">

    <div id="fork">
      <img id="fork-img" src="assets/fork_fill_0.png" alt="">
      <div class="score-panel">
        <span class="score-label">النقاط</span>
        <span class="score-value">0</span>
      </div>
    </div>

    <img src="assets/arrow_direction.png" alt="" class="arrow-guide">
  </section>

  <section id="screen-result" class="screen hidden">
    <div class="speech-bubble">
      <img src="assets/chat.png" alt="" class="speech-bubble-img">
      <span class="speech-bubble-text"></span>
    </div>

    <div class="result-card">
      <div class="leaderboard-section">
        <div class="lb-image-container">
          <div class="lb-rows"></div>
        </div>
      </div>

      <div class="score-display">
        <span class="score-label">نقاطك</span>
        <span class="score-value">0</span>
      </div>

      <input type="text" class="name-input" placeholder="اسمك" maxlength="10">

      <div class="result-buttons">
        <button class="save-btn">حفظ</button>
        <button class="skip-btn">تخطي</button>
      </div>
    </div>
  </section>

  <script type="module" src="js/gameManager.js"></script>
</body>
</html>
